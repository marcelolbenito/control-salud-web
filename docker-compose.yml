# Control Salud — Docker Compose
# Finales de línea: LF (Unix). En Windows, Git debe respetar .gitattributes para no subir CRLF.
#
# Puertos publicados (host → contenedor) se pueden sobreescribir con .env en la raíz:
#   CONTROL_SALUD_WEB_PUBLISH=127.0.0.1:8082:80     # servidor detrás de Nginx (evita choque con 8080)
#   CONTROL_SALUD_MYSQL_PUBLISH=127.0.0.1:3307:3306
#   CONTROL_SALUD_PMA_PUBLISH=127.0.0.1:8083:80     # si 8081 está ocupado
# Valores por defecto pensados para desarrollo local.

services:
  mysql:
    image: mysql:8.0
    container_name: control-salud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-salud_root_dev}
      MYSQL_DATABASE: control_salud
    ports:
      - "${CONTROL_SALUD_MYSQL_PUBLISH:-3307:3306}"
    volumes:
      - control_salud_mysql_data:/var/lib/mysql
      - ./sql/schema_mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  webapp:
    build:
      context: ./docker/web
      dockerfile: Dockerfile
    container_name: control-salud-web
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    volumes:
      - ./web:/var/www
    ports:
      - "${CONTROL_SALUD_WEB_PUBLISH:-8080:80}"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: control-salud-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-salud_root_dev}
    ports:
      - "${CONTROL_SALUD_PMA_PUBLISH:-8081:80}"

volumes:
  control_salud_mysql_data:
